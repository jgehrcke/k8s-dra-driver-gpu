name: CI Pipeline

on:
  push:
    branches:
      - "pull-request/[0-9]+"
      - main
      - release-*

jobs:
  basic:
    uses: ./.github/workflows/basic-checks.yaml

  chart:
    runs-on: linux-amd64-cpu4
    # the below container image contains helm but makes complications when
    # trying to interact with the git repo checked out via actions/checkout:
    # even with the .git directory present in the current working directory
    # there's a "not a git repository" err output upon `git diff`. also see
    # https://github.com/actions/checkout/issues/363 container: image:
    # docker.io/alpine/helm
    steps:
      - uses: actions/checkout@v5
        name: checkout
        with:
          # for git diff to work
          fetch-depth: 2
      - name: build-and-push-chart
        run: |
          curl -sSfLO --retry 8 --retry-all-errors --connect-timeout 10 --retry-delay 5 \
            https://get.helm.sh/helm-v3.18.6-linux-amd64.tar.gz
          tar -zxvf helm-v3*amd64.tar.gz && mv linux-amd64/helm .
          export VERSION="$(make print-VERSION)"
          export VERSION_W_COMMIT="$(make print-VERSION)-$(echo $GITHUB_SHA | cut -c1-8)"
          # remove leading 'v'
          echo "replace ${VERSION:1} with ${VERSION_W_COMMIT:1}"
          # consider using --version and --appVersion args instead upon packaging
          sed -i "s/${VERSION:1}/${VERSION_W_COMMIT:1}/g" deployments/helm/nvidia-dra-driver-gpu/Chart.yaml
          sed -i "s/nvcr\.io/ghcr.io/g" deployments/helm/nvidia-dra-driver-gpu/values.yaml
          sed -i "s/tag: \"\"/tag: \"${VERSION_W_COMMIT}-ubi9\"/g" deployments/helm/nvidia-dra-driver-gpu/values.yaml
          git diff || echo "ignore git diff exit code"
          ./helm package deployments/helm/nvidia-dra-driver-gpu
          # dev note: above should maybe be a makefile target, e.g. `make chart-dev-package`
          echo ${{ secrets.GITHUB_TOKEN }} | ./helm registry login --password-stdin ghcr.io -u NVIDIA
          ./helm push k8s-dra-driver-gpu-*tgz oci://ghcr.io/nvidia

