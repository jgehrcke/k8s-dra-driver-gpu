name: CI Pipeline

on:
  push:
    branches:
      - "pull-request/[0-9]+"
      - main
      - release-*

jobs:
  basic:
    uses: ./.github/workflows/basic-checks.yaml

  chart:
    runs-on: linux-amd64-cpu4
    # container:
    #   image: docker.io/alpine/helm
    steps:
      - uses: actions/checkout@v5
        name: checkout
        with:
          # for git diff to work
          fetch-depth: 0
      - name: build-and-push-chart
        run: |
          # use GNU sed
          #apk add --no-cache make diffutils sed git
          export VERSION="$(make print-VERSION)"
          export VERSION_W_COMMIT="$(make print-VERSION)-$(echo $GITHUB_SHA | cut -c1-8)"
          # remove leading 'v'
          echo "replace ${VERSION:1} with ${VERSION_W_COMMIT:1}"
          sed -i.bak "s/${VERSION:1}/${VERSION_W_COMMIT:1}/g" deployments/helm/nvidia-dra-driver-gpu/Chart.yaml
          sed -i "s/nvcr\.io/ghcr.io/g" deployments/helm/nvidia-dra-driver-gpu/values.yaml
          #(cd deployments/helm/nvidia-dra-driver-gpu && diff -wu Chart.yaml.bak Chart.yaml) || echo "ignore diff exit code"
          ls -ahltr
          git diff
          helm package deployments/helm/nvidia-dra-driver-gpu
          # dev note: above should be a makefile target, e.g. `make chart-dev-package`
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login --password-stdin ghcr.io -u NVIDIA
          # maybe the name is bad
          helm push k8s-dra-driver-gpu-*tgz oci://ghcr.io/nvidia

